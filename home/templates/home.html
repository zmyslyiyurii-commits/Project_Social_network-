<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Clone - Головна</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/static/aurora.css">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body class="bg-[#101726] min-h-screen flex flex-col items-center justify-center font-sans relative overflow-hidden">
    <div id="aurora-bg" class="aurora-container"></div>
    
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full mx-4 z-10 relative">
        <div class="text-6xl mb-4">👻</div>
        
        <h1 class="mb-3 animated-gradient-text">
            Ласкаво просимо!
        </h1>
        
        <p class="text-white/70 mb-6 text-sm">Це твій майбутній Snapchat на Django.</p>
        
        <!-- Оновлений блок кнопок -->
        <div class="space-y-4">
            <a href="{% url 'register' %}" class="uiverse-btn btn-register" role="button" aria-label="Реєстрація">
                <div class="uiverse-btn-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/>
                    </svg>
                    <span>Зареєструватися</span>
                </div>
            </a>
            <a href="{% url 'login' %}" class="uiverse-btn btn-login" role="button" aria-label="Вхід">
                <div class="uiverse-btn-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M10 17l5-5-5-5v4H3v2h7v4zm10 2h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/>
                    </svg>
                    <span>Увійти в акаунт</span>
                </div>
            </a>
        </div>

    <script type="module">
        import { initAurora } from '/static/aurora.js';
        initAurora('aurora-bg', {
            colorStops: ["#8B6F01", "#EAB308", "#8B6F01"], 
            amplitude: 1.0,
            blend: 0.5,
            speed: 0.5
        });
    </script>
    <script src="/static/home.js"></script>
</body>
</html>
