<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Clone - Головна</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/static/aurora.css">
</head>
<body class="bg-[#101726] min-h-screen flex flex-col items-center justify-center font-sans relative overflow-hidden">
    <div id="aurora-bg" class="aurora-container"></div>
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full mx-4 z-10 relative">
        <div class="text-6xl mb-4">👻</div>
        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Ласкаво просимо!</h1>
        <p class="text-gray-600 mb-6">Це твий майбутній Snapchat на Django.</p>
        <div class="space-y-3">
            <a href="{% url 'register' %}" class="block w-full bg-black text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-800 transition text-center no-underline">
                Зареєструватися
            </a>
            <a href="{% url 'login' %}" class="block w-full bg-gray-100 text-gray-800 font-bold py-3 px-4 rounded-xl hover:bg-gray-200 transition text-center no-underline border border-gray-300">
                Увійти в акаунт
            </a>
        </div>
    </div>
    <script type="module">
        import { initAurora } from '/static/aurora.js';
        // Запуск ефекту для блоку з id="aurora-bg"
        initAurora('aurora-bg', {
            colorStops: ["#8B6F01", "#EAB308", "#8B6F01"], 
            amplitude: 1.0,
            blend: 0.5,
            speed: 0.5
        });
    </script>
</body>
</html>
