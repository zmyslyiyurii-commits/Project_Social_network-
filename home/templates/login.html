<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Snapchat Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="max-w-md w-full relative overflow-hidden z-10 bg-gray-800 p-8 rounded-2xl shadow-2xl before:w-24 before:h-24 before:absolute before:bg-yellow-400 before:rounded-full before:-z-10 before:blur-2xl before:-top-6 before:-left-6 after:w-32 after:h-32 after:absolute after:bg-yellow-300 after:rounded-full after:-z-10 after:blur-xl after:top-24 after:-right-12">
        
        <div class="text-center mb-6">
            <span class="text-4xl">👻</span>
            <h2 class="text-2xl font-bold text-white mt-2">Вхід в акаунт</h2>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% if form.non_field_errors %}
                <div class="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg text-sm">
                    {{ form.non_field_errors.as_text }}
                </div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-300">Ім'я користувача (Нікнейм)</label>
                <input type="text" name="username" autofocus required
                       class="mt-1 p-2 w-full bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:border-yellow-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300">Пароль</label>
                <input type="password" name="password" required
                       class="mt-1 p-2 w-full bg-gray-700 border border-gray-600 rounded-md text-white focus:outline-none focus:border-yellow-400">
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 via-yellow-500 to-amber-500 text-black font-extrabold py-3 rounded-md hover:opacity-90 transition cursor-pointer shadow-md shadow-yellow-500/10">
                    Увійти
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'register' %}" class="text-sm text-gray-400 hover:text-yellow-400 transition">
                Ще немає акаунту? Зареєструватися
            </a>
        </div>
    </div>

</body>
</html>
