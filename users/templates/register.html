<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Snapchat Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans p-4">

    <div class="max-w-md w-full relative overflow-hidden z-10 bg-gray-800 p-8 rounded-2xl shadow-2xl before:w-24 before:h-24 before:absolute before:bg-yellow-400 before:rounded-full before:-z-10 before:blur-2xl before:-top-6 before:-left-6 after:w-32 after:h-32 after:absolute after:bg-yellow-300 after:rounded-full after:-z-10 after:blur-xl after:top-24 after:-right-12">
        
        <div class="text-center mb-6">
            <span class="text-4xl">👻</span>
            <h2 class="text-2xl font-bold text-white mt-2">Створити акаунт</h2>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-300">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-xs mt-1">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="pt-2">
                <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 via-yellow-500 to-amber-500 text-black font-extrabold py-3 rounded-md hover:opacity-90 transition cursor-pointer shadow-md shadow-yellow-500/10">
                    Зареєструватися
                </button>
            </div>
        </form>
    </div>

</body>
</html>
